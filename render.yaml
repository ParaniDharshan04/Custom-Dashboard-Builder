services:
  - type: web
    name: dashboard-builder
    env: python
    buildCommand: |
      cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dashboard-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "*"
    healthCheckPath: /health

  - type: pserv
    name: dashboard-db
    env: postgresql
    plan: free
    databaseName: dashboard_db
    user: dashboard_user